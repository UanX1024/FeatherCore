# EK-RA8P1 Board Configuration

[board]
name = "ek-ra8p1"
vendor = "renesas"
family = "ra8"
mcu = "ra8p1"

[cpu]
core = "cortex-m85"
frequency = 480000000
fpu = true

[memory]
flash_size = 2097152
sram_size = 1048576
dtcm_size = 256000

[bootloader]
boot_base_address = 0x00000000
boot_size = 0x10000  # 64KB
boot_stack_size = 0x2000   # 8KB

[kernel]
boot_base_address = 0x00010000
boot_size = 0x1F0000  # 1.9375MB
boot_stack_size = 0x4000   # 16KB
heap_size = 0x20000   # 128KB

[pinout]
# LED pins
led1 = "P100"

# UART pins
dbg_uart_tx = "P101"
dbg_uart_rx = "P102"

# SPI pins
spi1_sck = "P200"
spi1_miso = "P201"
spi1_mosi = "P202"

# I2C pins
i2c1_scl = "P300"
i2c1_sda = "P301"