# STM32F429I-DISC Board Configuration
# STM32F429I-DISC 板级配置
#
# 基于 Zephyr 的 stm32f429i_disc1 板级配置移植

[board]
name = "stm32f429i-disc"
full_name = "STMicroelectronics STM32F429I Discovery"
vendor = "st"
family = "stm32f4"
mcu = "stm32f429vgt6"

[cpu]
# ARM Cortex-M4 内核
core = "cortex-m4"
frequency = 180000000
fpu = true

[memory]
# Flash: 2MB (2048KB)
flash_size = 2097152
# SRAM: 192KB + 64KB DTCM + 112KB SRAM1 + 16KB SRAM2 = 384KB
# 这里使用总 RAM 大小
sram_size = 196608
dtcm_size = 65536
sram1_size = 114688
sram2_size = 16384

# 外部 SDRAM: 8MB
sdram_size = 8388608

[bootloader]
# Bootloader 起始地址和大小
boot_base_address = 0x08000000
boot_size = 0x10000  # 64KB
boot_stack_size = 0x1000   # 4KB

[kernel]
# Kernel 起始地址和大小
kernel_base_address = 0x08010000
kernel_size = 0x1F0000  # 1.9375MB
kernel_boot_stack_size = 0x4000   # 16KB
kernel_heap_size = 0x10000   # 64KB

# 支持的外设
[supported]
counter = true
i2c = true
spi = true
display = true
gpio = true
uart = true

# 默认配置
[config]
arm_mpu = true
hw_stack_protection = true
serial = true
console = true
uart_console = true

[pinout]
# LED pins (根据 STM32F429I-DISC 原理图)
# LD3 (绿色): PG13
# LD4 (红色): PG14
led3 = "PG13"
led4 = "PG14"

# 用户按钮
user_button = "PA0"

# UART pins (默认使用 USART1)
dbg_uart_tx = "PA9"
dbg_uart_rx = "PA10"

# SPI pins (使用 SPI5)
spi5_sck = "PF7"
spi5_miso = "PF8"
spi5_mosi = "PF9"
spi5_nss = "PF6"

# I2C pins (使用 I2C1)
i2c1_scl = "PB8"
i2c1_sda = "PB9"

# FMC (SDRAM) pins
# 用于连接外部 SDRAM
fmc_d0 = "PD14"
fmc_d1 = "PD15"
fmc_d2 = "PD0"
fmc_d3 = "PD1"