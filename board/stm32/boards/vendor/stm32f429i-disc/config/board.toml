# STM32F429I-DISC Board Configuration

[board]
name = "stm32f429i-disc"
vendor = "st"
family = "stm32f4"
mcu = "stm32f429vgt6"

[cpu]
core = "cortex-m4"
frequency = 180000000
fpu = true

[memory]
flash_size = 1048576
sram_size = 256000
dtcm_size = 64000
sram1_size = 112000
sram2_size = 16000

[bootloader]
boot_base_address = 0x08000000
boot_size = 0x10000  # 64KB
boot_stack_size = 0x1000   # 4KB

[kernel]
kernel_base_address = 0x08010000
kernel_size = 0x1F0000  # 1.9375MB
kernel_boot_stack_size = 0x4000   # 16KB
kernel_heap_size = 0x10000   # 64KB

[pinout]
# LED pins
led1 = "PD13"

# UART pins
dbg_uart_tx = "PA2"
dbg_uart_rx = "PA3"

# SPI pins
spi1_sck = "PA5"
spi1_miso = "PA6"
spi1_mosi = "PA7"

# I2C pins
i2c1_scl = "PB8"
i2c1_sda = "PB9"