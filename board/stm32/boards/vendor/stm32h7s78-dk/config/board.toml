# STM32H7S78-DK Board Configuration

[board]
name = "stm32h7s78-dk"
vendor = "st"
family = "stm32h7"
mcu = "stm32h7s78"

[cpu]
core = "cortex-m7"
frequency = 280000000
fpu = true

[memory]
flash_size = 2097152
sram_size = 1048576
dtcm_size = 128000
sram1_size = 512000
sram2_size = 256000

[bootloader]
boot_base_address = 0x08000000
boot_size = 0x10000  # 64KB
boot_stack_size = 0x2000   # 8KB

[kernel]
kernel_base_address = 0x08010000
kernel_size = 0x1F0000  # 1.9375MB
kernel_boot_stack_size = 0x4000   # 16KB
kernel_heap_size = 0x20000   # 128KB

[pinout]
# LED pins
led1 = "PD13"

# UART pins
dbg_uart_tx = "PA2"
dbg_uart_rx = "PA3"

# SPI pins
spi1_sck = "PA5"
spi1_miso = "PA6"
spi1_mosi = "PA7"

# I2C pins
i2c1_scl = "PB8"
i2c1_sda = "PB9"