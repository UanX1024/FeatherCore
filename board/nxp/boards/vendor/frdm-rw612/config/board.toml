# FRDM-RW612 Board Configuration

[board]
name = "frdm-rw612"
vendor = "nxp"
family = "rw612"
mcu = "rw612"

[cpu]
core = "cortex-m33"
frequency = 150000000
fpu = true

[memory]
flash_size = 2097152
sram_size = 640000
dtcm_size = 128000

[bootloader]
boot_base_address = 0x00000000
boot_size = 0x10000  # 64KB
boot_stack_size = 0x2000   # 8KB

[kernel]
boot_base_address = 0x00010000
boot_size = 0x1F0000  # 1.9375MB
boot_stack_size = 0x4000   # 16KB
heap_size = 0x20000   # 128KB

[pinout]
# LED pins
led1 = "PIO0_8"

# UART pins
dbg_uart_tx = "PIO0_0"
dbg_uart_rx = "PIO0_1"

# SPI pins
spi1_sck = "PIO0_14"
spi1_miso = "PIO0_15"
spi1_mosi = "PIO0_16"

# I2C pins
i2c1_scl = "PIO0_10"
i2c1_sda = "PIO0_11"