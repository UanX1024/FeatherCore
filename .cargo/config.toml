# FeatherCore Build Configuration

[target.thumbv6m-none-eabi]
runner = "qemu-system-arm -cpu cortex-m0 -machine lm3s6965evb -nographic -semihosting-config enable=on,target=native -kernel"

[target.thumbv7m-none-eabi]
runner = "qemu-system-arm -cpu cortex-m3 -machine lm3s6965evb -nographic -semihosting-config enable=on,target=native -kernel"

[target.thumbv7em-none-eabi]
runner = "qemu-system-arm -cpu cortex-m4 -machine lm3s6965evb -nographic -semihosting-config enable=on,target=native -kernel"

[target.thumbv7em-none-eabihf]
runner = "qemu-system-arm -cpu cortex-m4 -machine lm3s6965evb -nographic -semihosting-config enable=on,target=native -kernel"

[target.riscv32i-unknown-none-elf]
runner = "qemu-system-riscv32 -machine virt -nographic -bios none -kernel"

[target.riscv32imc-unknown-none-elf]
runner = "qemu-system-riscv32 -machine virt -nographic -bios none -kernel"

[target.riscv32imac-unknown-none-elf]
runner = "qemu-system-riscv32 -machine virt -nographic -bios none -kernel"

[target.riscv64imac-unknown-none-elf]
runner = "qemu-system-riscv64 -machine virt -nographic -bios none -kernel"

[target.riscv64gc-unknown-none-elf]
runner = "qemu-system-riscv64 -machine virt -nographic -bios none -kernel"

# Common linker flags for embedded targets
[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
  "-C", "linker=rust-lld",
  "-C", "relocation-model=static",
  "-C", "incremental=false",
]

[target.'cfg(all(target_arch = "riscv32", target_os = "none"))']
rustflags = [
  "-C", "linker=rust-lld",
  "-C", "relocation-model=static",
  "-C", "incremental=false",
]

[target.'cfg(all(target_arch = "riscv64", target_os = "none"))']
rustflags = [
  "-C", "linker=rust-lld",
  "-C", "relocation-model=static",
  "-C", "incremental=false",
]

# Build configuration
[build]
target = "thumbv7m-none-eabi"  # Default target (Cortex-M3)
