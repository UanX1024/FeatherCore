# STM32N6570-DK Board Configuration
# STM32N6570-DK 板级配置
#
# 高性能 Arm Cortex-M55 with Helium and Ethos-U55 NPU
# High-performance Arm Cortex-M55 with Helium and Ethos-U55 NPU

chip = "stm32n6"

[board]
# 开发板名称 / Board name
name = "stm32n6570-dk"
# 供应商 / Vendor
vendor = "st"
# 系列 / Family
family = "stm32n6"
# MCU 型号 / MCU model
mcu = "stm32n6570"

[cpu]
# CPU 内核类型 / CPU core type
core = "cortex-m55"
# CPU 频率 (Hz) / CPU frequency (Hz)
frequency = 400000000
# 是否支持浮点单元 / Whether to support floating point unit
fpu = true
# 是否支持双精度浮点 / Whether to support double precision floating point
fpu_dp = true
# 是否支持 Helium (M-Profile Vector Extension) / Whether to support Helium (M-Profile Vector Extension)
helium = true
# 是否支持 MVE (M-Profile Vector Extension) / Whether to support MVE (M-Profile Vector Extension)
mve = true
# CPU 核心数量 / Number of CPU cores
cores = 1

[memory]
# 内部 Flash 大小 (字节) / Internal Flash size (bytes)
flash_size = 2097152
# SRAM 大小 (字节) / SRAM size (bytes)
sram_size = 1048576
# 外部内存大小 (字节) / External memory size (bytes)
extmem_size = 0x1000000
# 外部内存基地址 / External memory base address
extmem_base = 0x70000000

[cache]
# 指令缓存 / Instruction cache
icache = true
# 数据缓存 / Data cache
dcache = true

[npu]
# 是否支持 Ethos-U55 NPU / Whether to support Ethos-U55 NPU
ethos_u55 = true
# 每时钟周期的 MAC 数量 / Number of MACs per clock cycle
macs_per_clock = 512

[gpu]
# 是否启用 GPU / Whether to enable GPU
enabled = true

[dma2d]
# 是否启用 DMA2D / Whether to enable DMA2D
enabled = true

[jpeg]
# 是否启用 JPEG / Whether to enable JPEG
enabled = true

[bootloader]
# Bootloader 起始地址 / Bootloader start address
boot_base_address = 0x08000000
# Bootloader 大小 / Bootloader size
boot_size = 0x10000  # 64KB
# Bootloader 栈大小 / Bootloader stack size
boot_stack_size = 0x1000   # 4KB

[kernel]
# Kernel 起始地址 / Kernel start address
boot_base_address = 0x08010000
# Kernel 大小 / Kernel size
boot_size = 0x7F0000  # 7.9375MB
# Kernel 启动栈大小 / Kernel boot stack size
boot_stack_size = 0x4000   # 16KB
# Kernel 堆大小 / Kernel heap size
heap_size = 0x20000   # 128KB

[security]
# 是否支持 TF-M / Whether to support TF-M
tfm = true
# 是否支持 AES 加密 / Whether to support AES encryption
crypto_aes = true
# 是否支持 SHA 哈希 / Whether to support SHA hash
crypto_sha = true
# 是否支持哈希 / Whether to support hash
hash = true

[serial]
# 控制台 UART 编号 / Console UART number
console_uart = 1
# 波特率 / Baud rate
baudrate = 115200
# UART 数量 / Number of UARTs
num_uart = 4

[gpio]
# GPIO 数量 / Number of GPIOs
num = 112

[i2c]
# I2C 数量 / Number of I2Cs
num = 4

[spi]
# SPI 数量 / Number of SPIs
num = 4

[can]
# CAN 数量 / Number of CANs
num = 2
# 是否支持 CAN FD / Whether to support CAN FD
fd = true

[usb]
# 是否支持 USB OTG / Whether to support USB OTG
otg = true
# 是否支持 USB Device / Whether to support USB Device
device = true
# 是否支持 USB HS / Whether to support USB HS
hs = true

[sdmmc]
# 是否支持 SD 卡 / Whether to support SD card
sd = true

[octospi]
# 是否启用 OctoSPI / Whether to enable OctoSPI
enabled = true

[hyperbus]
# 是否启用 HyperBus / Whether to enable HyperBus
enabled = true

[dma]
# DMA 数量 / Number of DMAs
num = 2

[adc]
# ADC 数量 / Number of ADCs
num = 2

[dac]
# DAC 数量 / Number of DACs
num = 2

[crc]
# 是否支持硬件 CRC / Whether to support hardware CRC
hw = true

[rng]
# 是否支持硬件随机数生成器 / Whether to support hardware random number generator
hw = true

[watchdog]
# 是否支持独立看门狗 / Whether to support independent watchdog
iwdg = true

[debug]
# 是否支持 SWD 调试 / Whether to support SWD debugging
sw = true

[pinout]
# LED pins (根据 STM32N6570-DK 原理图)
# LED 引脚配置
# led1 = "PD13"

# UART pins (默认使用 USART1)
# UART 引脚配置
# dbg_uart_tx = "PA2"
# dbg_uart_rx = "PA3"

# SPI pins
# SPI 引脚配置
# spi1_sck = "PA5"
# spi1_miso = "PA6"
# spi1_mosi = "PA7"

# I2C pins
# I2C 引脚配置
# i2c1_scl = "PB8"
# i2c1_sda = "PB9"
