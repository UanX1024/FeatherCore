# STM32F429I-DISC Board Configuration
# STM32F429I-DISC 板级配置
#
# 基于 Zephyr 的 stm32f429i_disc1 板级配置移植

[board]
# 开发板名称 / Board name
name = "stm32f429i-disc"
# 完整名称 / Full name
full_name = "STMicroelectronics STM32F429I Discovery"
# 供应商 / Vendor
vendor = "st"
# 系列 / Family
family = "stm32f4"
# MCU 型号 / MCU model
mcu = "stm32f429vgt6"

[cpu]
# CPU 内核类型 / CPU core type
core = "cortex-m4"
# CPU 频率 (Hz) / CPU frequency (Hz)
frequency = 180000000
# 是否支持浮点单元 / Whether to support floating point unit
fpu = true

[memory]
# 内部 Flash 大小 (字节) / Internal Flash size (bytes)
# Flash: 2MB (2048KB)
flash_size = 2097152
# SRAM 大小 (字节) / SRAM size (bytes)
# SRAM: 192KB + 64KB DTCM + 112KB SRAM1 + 16KB SRAM2 = 384KB
# 这里使用总 RAM 大小
sram_size = 196608
# DTCM 大小 (字节) / DTCM size (bytes)
dtcm_size = 65536
# SRAM1 大小 (字节) / SRAM1 size (bytes)
sram1_size = 114688
# SRAM2 大小 (字节) / SRAM2 size (bytes)
sram2_size = 16384
# 外部 SDRAM 大小 (字节) / External SDRAM size (bytes)
# 外部 SDRAM: 8MB
sdram_size = 8388608

[bootloader]
# Bootloader 起始地址 / Bootloader start address
# Bootloader 起始地址和大小
boot_base_address = 0x08000000
# Bootloader 大小 / Bootloader size
boot_size = 0x10000  # 64KB
# Bootloader 栈大小 / Bootloader stack size
boot_stack_size = 0x1000   # 4KB

[kernel]
# Kernel 起始地址 / Kernel start address
# Kernel 起始地址和大小
kernel_base_address = 0x08010000
# Kernel 大小 / Kernel size
kernel_size = 0x1F0000  # 1.9375MB
# Kernel 启动栈大小 / Kernel boot stack size
kernel_boot_stack_size = 0x4000   # 16KB
# Kernel 堆大小 / Kernel heap size
kernel_heap_size = 0x10000   # 64KB

# 支持的外设 / Supported peripherals
[supported]
counter = true
i2c = true
spi = true
display = true
gpio = true
uart = true

# 默认配置 / Default configuration
[config]
arm_mpu = true
hw_stack_protection = true
serial = true
console = true
uart_console = true

[pinout]
# LED pins (根据 STM32F429I-DISC 原理图)
# LED 引脚配置 / LED pins configuration
# LD3 (绿色): PG13
# LD4 (红色): PG14
led3 = "PG13"
led4 = "PG14"

# 用户按钮 / User button
user_button = "PA0"

# UART pins (默认使用 USART1)
# UART 引脚配置 / UART pins configuration
dbg_uart_tx = "PA9"
dbg_uart_rx = "PA10"

# SPI pins (使用 SPI5)
# SPI 引脚配置 / SPI pins configuration
spi5_sck = "PF7"
spi5_miso = "PF8"
spi5_mosi = "PF9"
spi5_nss = "PF6"

# I2C pins (使用 I2C1)
# I2C 引脚配置 / I2C pins configuration
i2c1_scl = "PB8"
i2c1_sda = "PB9"

# FMC (SDRAM) pins
# FMC (SDRAM) 引脚配置 / FMC (SDRAM) pins configuration
# 用于连接外部 SDRAM / Used to connect external SDRAM
fmc_d0 = "PD14"
fmc_d1 = "PD15"
fmc_d2 = "PD0"
fmc_d3 = "PD1"