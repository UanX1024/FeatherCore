# STM32F429I-DISC Board Configuration
# STM32F429I-DISC 板级配置
#
# 基于 Zephyr 的 stm32f429i_disc1 板级配置移植

chip = "stm32f4"

[board]
name = "stm32f429i-disc"
full_name = "STMicroelectronics STM32F429I Discovery"
vendor = "st"
family = "stm32f4"
mcu = "stm32f429vgt6"

[memory]
sram_size = 196608

[supported]
counter = true
i2c = true
spi = true
display = true
gpio = true
uart = true

[config]
arm_mpu = true
hw_stack_protection = true
serial = true
console = true
uart_console = true

[pinout]
led3 = "PG13"
led4 = "PG14"
user_button = "PA0"
dbg_uart_tx = "PA9"
dbg_uart_rx = "PA10"
spi5_sck = "PF7"
spi5_miso = "PF8"
spi5_mosi = "PF9"
spi5_nss = "PF6"
i2c1_scl = "PB8"
i2c1_sda = "PB9"
fmc_d0 = "PD14"
fmc_d1 = "PD15"
fmc_d2 = "PD0"
fmc_d3 = "PD1"
