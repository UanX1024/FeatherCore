# STM32U5G9J-DK1 Board Configuration
# STM32U5G9J-DK1 板级配置
#
# 与 STM32U5A9J-DK 相同的配置，主控型号不同

chip = "stm32n6"

[board]
# 开发板名称 / Board name
name = "stm32u5g9j-dk1"
# 供应商 / Vendor
vendor = "st"
# 系列 / Family
family = "stm32u5"
# MCU 型号 / MCU model
mcu = "stm32u5g9j"

[cpu]
# CPU 内核类型 / CPU core type
core = "cortex-m33"
# CPU 频率 (Hz) / CPU frequency (Hz)
frequency = 160000000
# 是否支持浮点单元 / Whether to support floating point unit
fpu = true

[memory]
# 内部 Flash 大小 (字节) / Internal Flash size (bytes)
flash_size = 2097152
# SRAM 大小 (字节) / SRAM size (bytes)
sram_size = 786432
# DTCM 大小 (字节) / DTCM size (bytes)
dtcm_size = 128000
# SRAM1 大小 (字节) / SRAM1 size (bytes)
sram1_size = 512000
# SRAM2 大小 (字节) / SRAM2 size (bytes)
sram2_size = 128000

[bootloader]
# Bootloader 起始地址 / Bootloader start address
boot_base_address = 0x08000000
# Bootloader 大小 / Bootloader size
boot_size = 0x10000  # 64KB
# Bootloader 栈大小 / Bootloader stack size
boot_stack_size = 0x2000   # 8KB

[kernel]
# Kernel 起始地址 / Kernel start address
boot_base_address = 0x08010000
# Kernel 大小 / Kernel size
boot_size = 0x1F0000  # 1.9375MB
# Kernel 启动栈大小 / Kernel boot stack size
boot_stack_size = 0x4000   # 16KB
# Kernel 堆大小 / Kernel heap size
heap_size = 0x20000   # 128KB

[pinout]
# LED pins (根据 STM32U5G9J-DK1 原理图)
led1 = "PD13"

# UART pins (默认使用 USART1)
dbg_uart_tx = "PA2"
dbg_uart_rx = "PA3"

# SPI pins (使用 SPI1)
spi1_sck = "PA5"
spi1_miso = "PA6"
spi1_mosi = "PA7"

# I2C pins (使用 I2C1)
i2c1_scl = "PB8"
i2c1_sda = "PB9"
