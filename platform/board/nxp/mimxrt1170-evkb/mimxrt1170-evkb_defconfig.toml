# MIMXRT1170-EVKB Board Configuration
# MIMXRT1170-EVKB 板级配置
#
# 基于 Zephyr 的 mimxrt1170_evk 板级配置移植

chip = "imxrt1170"

[board]
# 开发板名称 / Board name
name = "mimxrt1170-evkb"
# 供应商 / Vendor
vendor = "nxp"
# 系列 / Family
family = "mimxrt1170"
# MCU 型号 / MCU model
mcu = "mimxrt1176dvm"

[cpu]
# CPU 内核类型 / CPU core type
core = "cortex-m7"
# CPU 频率 (Hz) / CPU frequency (Hz)
frequency = 996000000
# 是否支持浮点单元 / Whether to support floating point unit
fpu = true

[memory]
# 内部 Flash 大小 (字节) / Internal Flash size (bytes)
flash_size = 8388608
# SRAM 大小 (字节) / SRAM size (bytes)
sram_size = 2097152
# DTCM 大小 (字节) / DTCM size (bytes)
dtcm_size = 512000

[bootloader]
# Bootloader 起始地址 / Bootloader start address
boot_base_address = 0x60000000
# Bootloader 大小 / Bootloader size
boot_size = 0x20000  # 128KB
# Bootloader 栈大小 / Bootloader stack size
boot_stack_size = 0x4000   # 16KB

[kernel]
# Kernel 起始地址 / Kernel start address
boot_base_address = 0x60020000
# Kernel 大小 / Kernel size
boot_size = 0x7E0000  # 7.875MB
# Kernel 启动栈大小 / Kernel boot stack size
boot_stack_size = 0x8000   # 32KB
# Kernel 堆大小 / Kernel heap size
heap_size = 0x40000   # 256KB

[pinout]
# LED pins (根据 MIMXRT1170-EVKB 原理图)
led1 = "GPIO_AD_09"

# UART pins (默认使用 LPUART1)
dbg_uart_tx = "GPIO_AD_01"
dbg_uart_rx = "GPIO_AD_02"

# SPI pins (使用 LPSPI1)
spi1_sck = "GPIO_AD_26"
spi1_miso = "GPIO_AD_27"
spi1_mosi = "GPIO_AD_28"

# I2C pins (使用 LPI2C5)
i2c1_scl = "GPIO_AD_14"
i2c1_sda = "GPIO_AD_15"
