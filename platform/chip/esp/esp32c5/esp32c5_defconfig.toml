# ESP32-C5 Chip Configuration
# ESP32-C5 芯片通用配置

[chip]
name = "esp32c5"
vendor = "espressif"
full_name = "Espressif ESP32-C5 Series"

[cpu]
core = "riscv32"
frequency = 240000000
fpu = false

[memory]
flash_base = 0x42000000
flash_size = 4194304  # 4MB default

sram_base = 0x3FF80000
sram_size = 393216  # 384KB default

[bootloader]
boot_base_address = 0x42000000
boot_size = 0x10000  # 64KB default
boot_stack_size = 0x2000  # 8KB default

[kernel]
kernel_base_address = 0x42010000
kernel_size = 0x3F0000  # 3.9375MB default
kernel_stack_size = 0x4000  # 16KB default
kernel_heap_size = 0x20000  # 128KB default
