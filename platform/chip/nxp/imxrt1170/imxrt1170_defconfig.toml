# i.MX RT1170 Chip Configuration
# i.MX RT1170 芯片通用配置

[chip]
name = "imxrt1170"
vendor = "nxp"
full_name = "NXP i.MX RT1170 Series"

[cpu]
core = "cortex-m7"
frequency = 600000000
fpu = true

[memory]
flash_base = 0x30000000
flash_size = 2097152  # 2MB default (Flash)

sram_base = 0x20000000
sram_size = 512 * 1024  # 512KB default

[bootloader]
boot_base_address = 0x30000000
boot_size = 0x10000  # 64KB default
boot_stack_size = 0x2000  # 8KB default

[kernel]
kernel_base_address = 0x30010000
kernel_size = 0x1F0000  # 1.9375MB default
kernel_stack_size = 0x8000  # 32KB default
kernel_heap_size = 0x20000  # 128KB default
