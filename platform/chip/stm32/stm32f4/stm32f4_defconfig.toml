# STM32F4 Series Chip Configuration
# STM32F4 系列芯片通用配置

[chip]
# 芯片系列 / Chip series
name = "stm32f4"
# 供应商 / Vendor
vendor = "stmicroelectronics"
# 全系列名称 / Full family name
full_name = "STMicroelectronics STM32F4 Series"

[cpu]
# CPU 内核类型 / CPU core type
core = "cortex-m4"
# 默认 CPU 频率 (Hz) / Default CPU frequency (Hz)
frequency = 180000000
# 是否支持浮点单元 / Whether to support floating point unit
fpu = true

[memory]
# 默认内部 Flash 大小 (字节) / Default internal Flash size (bytes)
# 芯片具体大小由 board 配置覆盖
flash_base = 0x08000000
flash_size = 2097152  # 2MB default

# 默认 SRAM 大小 (字节) / Default SRAM size (bytes)
sram_base = 0x20000000
sram_size = 192000  # 192KB default

[bootloader]
# Bootloader 默认起始地址 / Default bootloader start address
boot_base_address = 0x08000000
boot_size = 0x10000  # 64KB default
boot_stack_size = 0x1000  # 4KB default

[kernel]
# Kernel 默认起始地址 / Default kernel start address
kernel_base_address = 0x08010000
# 默认 Kernel 大小 / Default kernel size
kernel_size = 0x1F0000  # 1.9375MB default
# 默认 Kernel 栈大小 / Default kernel stack size
kernel_stack_size = 0x4000  # 16KB default
# 默认 Kernel 堆大小 / Default kernel heap size
kernel_heap_size = 0x10000  # 64KB default
