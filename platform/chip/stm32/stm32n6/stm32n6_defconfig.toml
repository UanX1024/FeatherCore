# STM32N6 Series Chip Configuration
# STM32N6 系列芯片通用配置

[chip]
name = "stm32n6"
vendor = "stmicroelectronics"
full_name = "STMicroelectronics STM32N6 Series"

[cpu]
core = "cortex-m55"
frequency = 800000000
fpu = true

[memory]
flash_base = 0x08000000
flash_size = 4194304  # 4MB default

sram_base = 0x20000000
sram_size = 2048 * 1024  # 2MB default

[bootloader]
boot_base_address = 0x08000000
boot_size = 0x20000  # 128KB default
boot_stack_size = 0x4000  # 16KB default

[kernel]
kernel_base_address = 0x08020000
kernel_size = 0x3E0000  # 3.9375MB default
kernel_stack_size = 0x10000  # 64KB default
kernel_heap_size = 0x40000  # 256KB default
